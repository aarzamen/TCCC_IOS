name: TCCC_IOS
options:
  bundleIdPrefix: com.aarzamen
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
packages:
  TCCCKit:
    path: Packages/TCCCKit
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "XM6E4PUXTU"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
targets:
  TCCC_IOS:
    type: application
    platform: iOS
    sources:
      - path: TCCC_IOS
        excludes:
          - "_Playground/**"
      # Superplayground — debug-only design tool. Files are gitignored;
      # `optional: true` means xcodegen tolerates the directory being absent
      # on clean clones. To enable: restore _Playground/ on disk AND set
      # PLAYGROUND_ENABLED in the Debug config below. See superplayground.md.
      - path: TCCC_IOS/_Playground
        optional: true
    dependencies:
      - package: TCCCKit
        product: TCCCDomain
      - package: TCCCKit
        product: TCCCExtractor
      - package: TCCCKit
        product: TCCCReports
      - package: TCCCKit
        product: TCCCDesign
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aarzamen.TCCCai
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_CFBundleDisplayName: "Swift TCCC"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Microphone access is required for offline voice intake of medic narration during casualty documentation. Audio never leaves the device."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Speech recognition runs entirely on-device to transcribe medic narration into the casualty record. Transcription never leaves the device."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Save the offline QR code of the encounter to Photos so you can scan it from another device when no wired handoff is available."
        GENERATE_INFOPLIST_FILE: YES
      configs:
        # Superplayground gating. To enable the design playground, uncomment
        # the SWIFT_ACTIVE_COMPILATION_CONDITIONS line AND restore the
        # _Playground/ directory. To disable, leave commented. Release builds
        # never set this. See superplayground.md.
        Debug:
          # SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG PLAYGROUND_ENABLED"
          # PLAYGROUND-ONLY: read access to the photo library for the custom
          # image picker. Remove with the rest of the playground when done.
          # INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "PLAYGROUND ONLY: pick custom images for design exploration. Never used in release builds."
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
