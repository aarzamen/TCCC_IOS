name: TCCC_IOS
options:
  bundleIdPrefix: com.aarzamen
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
packages:
  TCCCKit:
    path: Packages/TCCCKit
  # 2026-05-05 night-pass B1: Parakeet ASR alt-fallback. Apache 2.0.
  # Linked unconditionally; the Settings toggle decides whether to
  # actually instantiate ParakeetTranscriptStream at runtime.
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    exactVersion: "0.14.4"
  # 2026-05-05 LLM-backends L1: AnyLanguageModel wraps mlx-swift-lm
  # behind a LanguageModelSession-shaped API. AnyLanguageModel uses
  # Swift 6.1 package traits to gate the heavy MLX dep; Xcode itself
  # cannot declare trait-enabled package deps yet (XcodeGen issue
  # #1585, AnyLanguageModel README "Using Traits in Xcode Projects").
  # The documented workaround is a local SPM shim package whose
  # Package.swift requests `traits: ["MLX"]` and re-exports the
  # AnyLanguageModel module — that's TCCCLLM at Packages/TCCCLLM.
  TCCCLLM:
    path: Packages/TCCCLLM
  # 2026-05-10 Granite Speech Foundation Sprint 1 (v3 §G0): TCCCAudio
  # is a local SPM shim wrapping Blaizzy/mlx-audio-swift. Heavy MLX
  # audio deps (mlx-swift, mlx-swift-lm, swift-transformers,
  # swift-huggingface) live behind this shim, not in TCCCKit (pure
  # logic) and not in the app target (AGENTS.md "no logic in app
  # target"). Mirrors TCCCLLM pattern. Pinned to v0.1.2 commit SHA in
  # Packages/TCCCAudio/Package.swift.
  TCCCAudio:
    path: Packages/TCCCAudio
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "XM6E4PUXTU"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
targets:
  TCCC_IOS:
    type: application
    platform: iOS
    sources:
      - path: TCCC_IOS
    info:
      path: TCCC_IOS/Generated/Info.plist
      properties:
        CFBundleDisplayName: "Swift TCCC"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        ITSAppUsesNonExemptEncryption: false
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIRequiredDeviceCapabilities:
          - arm64
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - audio
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        NSMicrophoneUsageDescription: "Microphone access is required for offline voice intake of medic narration during casualty documentation. Audio never leaves the device."
        NSSpeechRecognitionUsageDescription: "Speech recognition runs entirely on-device to transcribe medic narration into the casualty record. Transcription never leaves the device."
        NSPhotoLibraryAddUsageDescription: "Save the offline QR code of the encounter to Photos so you can scan it from another device when no wired handoff is available."
    dependencies:
      - package: TCCCKit
        product: TCCCDomain
      - package: TCCCKit
        product: TCCCExtractor
      - package: TCCCKit
        product: TCCCReports
      - package: TCCCKit
        product: TCCCDesign
      - package: FluidAudio
        product: FluidAudio
      - package: TCCCLLM
        product: TCCCLLM
      - package: TCCCAudio
        product: TCCCAudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aarzamen.TCCCai
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: TCCC_IOS/TCCC_IOS.entitlements
  TCCC_IOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TCCC_IOSTests
    dependencies:
      - target: TCCC_IOS
      - package: TCCCKit
        product: TCCCDomain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aarzamen.TCCCaiTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TCCC_IOS.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/TCCC_IOS"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
