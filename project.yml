name: TCCC_IOS
options:
  bundleIdPrefix: com.aarzamen
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  TCCCKit:
    path: Packages/TCCCKit
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "XM6E4PUXTU"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
targets:
  TCCC_IOS:
    type: application
    platform: iOS
    sources:
      - path: TCCC_IOS
    dependencies:
      - package: TCCCKit
        product: TCCCDomain
      - package: TCCCKit
        product: TCCCExtractor
      - package: TCCCKit
        product: TCCCReports
      - package: TCCCKit
        product: TCCCDesign
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aarzamen.TCCCai
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Microphone access is required for offline voice intake of medic narration during casualty documentation. Audio never leaves the device."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Speech recognition runs entirely on-device to transcribe medic narration into the casualty record. Transcription never leaves the device."
        GENERATE_INFOPLIST_FILE: YES
