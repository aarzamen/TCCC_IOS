name: TCCC_IOS
options:
  bundleIdPrefix: com.aarzamen
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
packages:
  TCCCKit:
    path: Packages/TCCCKit
  # 2026-05-05 night-pass B1: Parakeet ASR alt-fallback. Apache 2.0.
  # Linked unconditionally; the Settings toggle decides whether to
  # actually instantiate ParakeetTranscriptStream at runtime.
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    exactVersion: "0.14.4"
  # 2026-05-05 LLM-backends L1: AnyLanguageModel wraps mlx-swift-lm
  # behind a LanguageModelSession-shaped API. AnyLanguageModel uses
  # Swift 6.1 package traits to gate the heavy MLX dep; Xcode itself
  # cannot declare trait-enabled package deps yet (XcodeGen issue
  # #1585, AnyLanguageModel README "Using Traits in Xcode Projects").
  # The documented workaround is a local SPM shim package whose
  # Package.swift requests `traits: ["MLX"]` and re-exports the
  # AnyLanguageModel module — that's TCCCLLM at Packages/TCCCLLM.
  TCCCLLM:
    path: Packages/TCCCLLM
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "XM6E4PUXTU"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
targets:
  TCCC_IOS:
    type: application
    platform: iOS
    sources:
      - path: TCCC_IOS
    dependencies:
      - package: TCCCKit
        product: TCCCDomain
      - package: TCCCKit
        product: TCCCExtractor
      - package: TCCCKit
        product: TCCCReports
      - package: TCCCKit
        product: TCCCDesign
      - package: FluidAudio
        product: FluidAudio
      - package: TCCCLLM
        product: TCCCLLM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aarzamen.TCCCai
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_CFBundleDisplayName: "Swift TCCC"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Microphone access is required for offline voice intake of medic narration during casualty documentation. Audio never leaves the device."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Speech recognition runs entirely on-device to transcribe medic narration into the casualty record. Transcription never leaves the device."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Save the offline QR code of the encounter to Photos so you can scan it from another device when no wired handoff is available."
        GENERATE_INFOPLIST_FILE: YES
