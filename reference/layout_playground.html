<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Swift TCCC — Layout Playground</title>
<style>
:root {
  --ui-bg: #0b0d10;
  --ui-bg1: #14181d;
  --ui-bg2: #1c2128;
  --ui-line: #262d36;
  --ui-fg: #e6e9ee;
  --ui-fg2: #8b94a3;
  --ui-fg3: #5b626d;
  --ui-accent: #ff8a3d;
  --ui-ok: #3fb950;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: var(--ui-bg);
  color: var(--ui-fg);
  font-size: 13px;
}

.app {
  display: grid;
  grid-template-columns: 320px 1fr;
  height: 100vh;
  overflow: hidden;
}

/* ====================== CONTROLS ====================== */

.controls {
  background: var(--ui-bg1);
  border-right: 1px solid var(--ui-line);
  overflow-y: auto;
  padding: 14px 16px;
}

.controls h1 {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ui-accent);
  margin: 0 0 16px 0;
}

.section {
  margin-bottom: 18px;
}
.section h2 {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ui-fg2);
  margin: 0 0 8px 0;
  border-top: 1px solid var(--ui-line);
  padding-top: 12px;
}

.row {
  display: grid;
  grid-template-columns: 1fr 56px;
  gap: 8px;
  align-items: center;
  margin-bottom: 6px;
}

.row label {
  display: flex;
  flex-direction: column;
  gap: 2px;
  font-size: 11px;
  color: var(--ui-fg);
}
.row label .name {
  font-weight: 500;
}
.row label .desc {
  font-size: 9px;
  color: var(--ui-fg3);
  letter-spacing: 0.06em;
}

.row input[type="range"] {
  width: 100%;
  accent-color: var(--ui-accent);
  background: transparent;
}

.row input[type="number"] {
  width: 100%;
  padding: 4px 6px;
  border: 1px solid var(--ui-line);
  background: var(--ui-bg);
  color: var(--ui-fg);
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 11px;
  border-radius: 2px;
  text-align: right;
}
.row input[type="number"]:focus {
  outline: 1px solid var(--ui-accent);
  border-color: var(--ui-accent);
}

.theme-radio {
  display: flex;
  gap: 4px;
  margin-bottom: 8px;
}
.theme-radio button {
  flex: 1;
  padding: 6px 4px;
  border: 1px solid var(--ui-line);
  background: var(--ui-bg);
  color: var(--ui-fg);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
}
.theme-radio button.active {
  border-color: var(--ui-accent);
  background: var(--ui-bg2);
  color: var(--ui-accent);
}

.preset-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 12px;
}
.preset-row button {
  padding: 6px 4px;
  border: 1px solid var(--ui-line);
  background: var(--ui-bg);
  color: var(--ui-fg);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
}
.preset-row button:hover {
  border-color: var(--ui-accent);
}

.action-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 14px;
}
.action-row button {
  padding: 8px 6px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
}
#resetBtn {
  background: var(--ui-bg);
  border: 1px solid var(--ui-line);
  color: var(--ui-fg);
}
#resetBtn:hover { border-color: var(--ui-fg2); }
#copyBtn {
  background: var(--ui-accent);
  border: 1px solid var(--ui-accent);
  color: #1a1209;
}
#copyBtn.copied {
  background: var(--ui-ok);
  border-color: var(--ui-ok);
}

/* ====================== PREVIEW ====================== */

.preview {
  display: grid;
  grid-template-rows: 44px 1fr auto;
  height: 100vh;
  overflow: hidden;
}

.toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 16px;
  border-bottom: 1px solid var(--ui-line);
  background: var(--ui-bg1);
  font-size: 11px;
}
.toolbar .label {
  color: var(--ui-fg2);
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.toolbar button.screen-btn {
  padding: 4px 10px;
  border: 1px solid var(--ui-line);
  background: var(--ui-bg);
  color: var(--ui-fg2);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  font-family: ui-monospace, monospace;
}
.toolbar button.screen-btn.active {
  border-color: var(--ui-accent);
  color: var(--ui-accent);
  background: var(--ui-bg2);
}
.toolbar select {
  padding: 4px 6px;
  border: 1px solid var(--ui-line);
  background: var(--ui-bg);
  color: var(--ui-fg);
  font-size: 11px;
  font-family: ui-monospace, monospace;
}
.toolbar .spacer { flex: 1; }
.toolbar .pt-display {
  color: var(--ui-fg3);
  font-family: ui-monospace, monospace;
  font-size: 10px;
}

.canvas-wrapper {
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: auto;
  background: #06080a;
  background-image:
    linear-gradient(45deg, #0a0d10 25%, transparent 25%),
    linear-gradient(-45deg, #0a0d10 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #0a0d10 75%),
    linear-gradient(-45deg, transparent 75%, #0a0d10 75%);
  background-size: 16px 16px;
  background-position: 0 0, 0 8px, 8px -8px, -8px 0;
}

.canvas {
  /* iPhone 17 Pro landscape: 874 × 402 pt (per actual AXFrame) */
  width: 874px;
  height: 402px;
  display: flex;
  flex-direction: column;
  position: relative;
  border: 1px solid var(--ui-line);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro", system-ui, sans-serif;
  transform-origin: center center;
  transition: transform 80ms ease-out;
  flex-shrink: 0;
}

/* Theme palettes — applied via [data-theme="..."] on .canvas */

.canvas[data-theme="tactical"] {
  --c-bg:#080302; --c-bg1:#110604; --c-bg2:#1a0907; --c-bg3:#240d0a;
  --c-line:#3a1108; --c-lineStrong:#5a1a0e;
  --c-fg:#e8c4bc; --c-fg1:#c89890; --c-fg2:#8a564f; --c-fg3:#5a3530;
  --c-accent:#d63a1f; --c-accentDim:#8a2412; --c-accentHot:#ff4a26;
  --c-crit:#ff4a26; --c-warn:#d4870f; --c-ok:#6a8a3a; --c-rec:#ff2d12;
  --c-grid:#1a0805;
}
.canvas[data-theme="dark"] {
  --c-bg:#0a0b0d; --c-bg1:#111317; --c-bg2:#181b21; --c-bg3:#20242c;
  --c-line:#2a2f38; --c-lineStrong:#3a4150;
  --c-fg:#f0f2f5; --c-fg1:#b8bdc7; --c-fg2:#7a818d; --c-fg3:#4a505a;
  --c-accent:#ff8a3d; --c-accentDim:#8a4a1f; --c-accentHot:#ffa566;
  --c-crit:#ff3b2f; --c-warn:#ffb020; --c-ok:#3fb950; --c-rec:#ff3b2f;
  --c-grid:#15181d;
}
.canvas[data-theme="light"] {
  --c-bg:#e8e6e0; --c-bg1:#ddd9d0; --c-bg2:#cfcabe; --c-bg3:#b8b2a2;
  --c-line:#6a6356; --c-lineStrong:#2a2620;
  --c-fg:#0a0807; --c-fg1:#3a342c; --c-fg2:#6a6356; --c-fg3:#8a8278;
  --c-accent:#b8341a; --c-accentDim:#7a1f10; --c-accentHot:#d63a1f;
  --c-crit:#b8341a; --c-warn:#8a5510; --c-ok:#3a6a1a; --c-rec:#b8341a;
  --c-grid:#d0ccc0;
}

.canvas { background: var(--c-bg); color: var(--c-fg); }

/* ====================== STATUS STRIP ====================== */

.status-strip {
  display: flex;
  align-items: stretch;
  background: var(--c-bg);
  border-bottom: var(--hairline,1px) solid var(--c-line);
  flex-shrink: 0;
}
.status-cell {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 10px;
  border-right: var(--hairline,1px) solid var(--c-line);
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 11px;
  font-weight: 600;
}
.status-cell:last-child { border-right: none; }
.status-cell .icon { color: var(--c-fg2); font-size: 10px; }
.rec-dot { width: 11px; height: 11px; border-radius: 50%; background: var(--c-rec); }

.rf-ghost {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 10px;
  border-right: var(--hairline,1px) solid var(--c-line);
}
.rf-ghost .label {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.16em;
  color: var(--c-accent);
}
.rf-ghost .icons {
  display: flex;
  gap: 3px;
}
.rf-ghost .icons span {
  width: 8px;
  height: 8px;
  display: inline-block;
  background: linear-gradient(135deg, transparent 45%, var(--c-fg3) 45%, var(--c-fg3) 55%, transparent 55%);
}
.page-indicator {
  display: flex;
  gap: 6px;
  padding: 0 12px;
}
.page-indicator div {
  width: 8px;
  height: 3px;
  background: var(--c-fg3);
  border-radius: 1.5px;
}
.page-indicator div.active {
  width: 18px;
  background: var(--c-accent);
}

.battery {
  display: flex;
  align-items: center;
  gap: 4px;
}
.battery-shape {
  width: 22px;
  height: 11px;
  border: 1px solid var(--c-fg2);
  border-radius: 1px;
  position: relative;
}
.battery-shape::after {
  content: '';
  position: absolute;
  right: -3px;
  top: 3px;
  width: 1.5px;
  height: 4px;
  background: var(--c-fg2);
}
.battery-shape::before {
  content: '';
  position: absolute;
  left: 1px;
  top: 1px;
  bottom: 1px;
  width: 14px;
  background: var(--c-fg);
}

/* ====================== PAGE HEADER ====================== */

.page-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 18px;
  background: var(--c-bg);
  border-bottom: var(--hairline,1px) solid var(--c-line);
  flex-shrink: 0;
}
.page-header .index {
  font-family: ui-monospace, monospace;
  font-weight: 800;
  color: var(--c-accent);
  letter-spacing: 0.06em;
  white-space: nowrap;
}
.page-header .title {
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  white-space: nowrap;
}
.page-header .kicker {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
  color: var(--c-fg3);
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.page-header .spacer { flex: 1; }
.page-header .trailing {
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.page-header .trailing .label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
  color: var(--c-fg2);
  text-transform: uppercase;
}
.page-header .trailing .value {
  font-family: ui-monospace, monospace;
  font-weight: 600;
  color: var(--c-fg1);
}

/* ====================== SCREEN BODY ====================== */

.screen-body {
  flex: 1;
  display: flex;
  gap: var(--gridGap, 8px);
  background: var(--c-bg);
  overflow: hidden;
}

/* ====================== PANELS ====================== */

.panel {
  background: var(--c-bg1);
  border: var(--hairline,1px) solid var(--c-line);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-header {
  display: flex;
  align-items: center;
  background: var(--c-bg);
  border-bottom: var(--hairline,1px) solid var(--c-line);
  padding: 0 12px;
  flex-shrink: 0;
}
.panel-header .title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--c-fg);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 6px;
}
.panel-header .action {
  margin-left: auto;
  font-family: ui-monospace, monospace;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--c-accent);
  text-transform: uppercase;
}
.panel-body {
  flex: 1;
  overflow: hidden;
}
.panel-body.padded { padding: var(--panelPadding, 12px); }

/* ====================== ATOMS ====================== */

.label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--c-fg2);
}
.label-tiny {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--c-fg2);
}
.mono {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-feature-settings: "tnum";
}

/* ====================== TRANSCRIPT ROWS (Live Capture) ====================== */

.transcript-row {
  display: grid;
  grid-template-columns: 78px 1fr;
  padding: 10px 14px;
  border-bottom: var(--hairline,1px) solid var(--c-line);
  font-size: 14px;
  line-height: 1.35;
}
.transcript-row .col-meta {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.transcript-row .speaker {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
}
.speaker-medic { color: var(--c-fg1); }
.speaker-casualty { color: var(--c-fg2); }
.speaker-system { color: var(--c-accent); font-style: italic; }
.transcript-row .timestamp {
  font-family: ui-monospace, monospace;
  font-size: 10px;
  color: var(--c-fg3);
}
.transcript-row.system { font-style: italic; color: var(--c-accent); }

/* ====================== CAPTURE ATOMS ====================== */

.rec-capsule {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--c-bg);
  border: var(--hairline,1px) solid var(--c-line);
}
.rec-capsule .dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--c-rec);
}
.rec-capsule .timer {
  font-family: ui-monospace, monospace;
  font-weight: 600;
  font-size: 13px;
}
.rec-capsule .specs {
  margin-left: auto;
  font-family: ui-monospace, monospace;
  font-size: 11px;
  color: var(--c-fg2);
  letter-spacing: 0.05em;
}

.audio-meter {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  padding: 8px 0;
}
.audio-meter .slot {
  width: 3px;
  background: var(--c-bg2);
  position: relative;
}
.audio-meter .fill {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  background: var(--c-accent);
}
.audio-meter .slot:nth-last-child(-n+4) .fill {
  background: var(--c-accentHot);
}

.voice-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.voice-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  background: var(--c-bg2);
  border: var(--hairline,1px) solid var(--c-line);
  font-family: ui-monospace, monospace;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--c-fg1);
}
.voice-chip .icon { color: var(--c-accent); font-size: 12px; }

.big-btn-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.big-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 14px;
  background: var(--c-bg1);
  border: var(--hairline,1px) solid var(--c-line);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--c-fg);
}
.big-btn .icon { color: var(--c-fg1); font-size: 18px; }
.big-btn.accent { background: var(--c-accentDim); border-color: var(--c-accent); }
.big-btn.accent .icon { color: var(--c-accent); }

/* ====================== EXTRACTED FACTS ====================== */

.fact-row {
  display: grid;
  grid-template-columns: 18px 1fr auto;
  gap: 10px;
  align-items: flex-start;
  padding: 8px 12px;
  border-bottom: var(--hairline,1px) solid var(--c-line);
}
.fact-row.hot { background: var(--c-bg2); }
.fact-row .icon { color: var(--c-fg2); font-size: 14px; padding-top: 2px; }
.fact-row.hot .icon { color: var(--c-accent); }
.fact-row .meta {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.fact-row .label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.14em;
  color: var(--c-fg2);
  text-transform: uppercase;
}
.fact-row .value {
  font-family: ui-monospace, monospace;
  font-size: 13px;
  font-weight: 600;
  color: var(--c-fg);
}
.fact-row .ts {
  font-family: ui-monospace, monospace;
  font-size: 10px;
  color: var(--c-fg3);
}

/* ====================== VITALS ====================== */

.big-vital {
  background: var(--c-bg1);
  border: var(--hairline,1px) solid var(--c-line);
  position: relative;
  display: flex;
  flex-direction: column;
  padding: 0;
  overflow: hidden;
}
.big-vital::before {
  content: '';
  display: block;
  height: 2px;
}
.big-vital.crit::before { background: var(--c-crit); }
.big-vital.warn::before { background: var(--c-warn); }
.big-vital.normal::before { background: var(--c-lineStrong); }

.big-vital .body {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 10px 14px 12px;
  flex: 1;
  justify-content: space-between;
}
.big-vital .header {
  display: flex;
  align-items: center;
  gap: 6px;
}
.big-vital .header .name {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  color: var(--c-fg2);
  text-transform: uppercase;
}
.big-vital .header .pip {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
}
.big-vital.crit .pip { color: var(--c-crit); }
.big-vital.warn .pip { color: var(--c-warn); }
.big-vital .pip .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}

.big-vital .value-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
}
.big-vital .value {
  font-family: ui-monospace, "SF Mono", monospace;
  font-weight: 700;
  letter-spacing: -0.03em;
  font-feature-settings: "tnum";
}
.big-vital.crit .value { color: var(--c-crit); }
.big-vital.warn .value { color: var(--c-warn); }
.big-vital.normal .value { color: var(--c-fg); }
.big-vital .unit {
  font-family: ui-monospace, monospace;
  font-size: 11px;
  color: var(--c-fg2);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.big-vital .sub {
  font-size: 12px;
  color: var(--c-fg2);
}

.small-vital {
  background: var(--c-bg1);
  border: var(--hairline,1px) solid var(--c-line);
  padding: 6px 10px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  justify-content: center;
}
.small-vital .label {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  color: var(--c-fg2);
}
.small-vital .value {
  font-family: ui-monospace, monospace;
  font-weight: 700;
}
.small-vital.warn .value { color: var(--c-warn); }
.small-vital .unit {
  font-size: 10px;
  color: var(--c-fg2);
  letter-spacing: 0.06em;
  font-family: ui-monospace, monospace;
}

.ecg-canvas {
  flex: 1;
  position: relative;
  overflow: hidden;
}
.ecg-canvas svg { display: block; width: 100%; height: 100%; }

.trend-canvas {
  flex: 1;
  position: relative;
}
.trend-canvas svg { display: block; width: 100%; height: 100%; }

.intervention-row {
  display: grid;
  grid-template-columns: 54px 18px 60px 1fr;
  gap: 6px;
  align-items: center;
  padding: 8px 12px;
  border-bottom: var(--hairline,1px) solid var(--c-line);
  font-size: 11px;
}
.intervention-row.hot { background: var(--c-bg2); }
.intervention-row .ts { font-family: ui-monospace, monospace; color: var(--c-fg2); }
.intervention-row.hot .ts { color: var(--c-accent); }
.intervention-row .kind {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--c-fg2);
  text-transform: uppercase;
}
.intervention-row .desc {
  font-family: ui-monospace, monospace;
  color: var(--c-fg);
}

/* ====================== TCCC CARD ====================== */

.field-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.field {
  border: var(--hairline,1px) solid var(--c-line);
  padding: 4px 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.field .label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.14em;
  color: var(--c-fg2);
  text-transform: uppercase;
}
.field .value {
  font-family: ui-monospace, monospace;
  font-size: 13px;
  font-weight: 600;
  color: var(--c-fg);
}

.body-map {
  width: 100%;
  background: var(--c-bg);
  position: relative;
}
.body-map svg { display: block; width: 100%; height: 100%; }

.march-row {
  display: grid;
  grid-template-columns: 36px 1fr 22px;
  gap: 0;
  align-items: center;
  padding: 10px 12px;
  border-bottom: var(--hairline,1px) solid var(--c-line);
}
.march-row .letter {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 0.04em;
}
.march-row.crit { border-left: 3px solid var(--c-crit); }
.march-row.warn { border-left: 3px solid var(--c-warn); }
.march-row.done { border-left: 3px solid var(--c-fg1); }
.march-row.open { border-left: 3px solid var(--c-accent); }
.march-row.crit .letter { color: var(--c-crit); }
.march-row.warn .letter { color: var(--c-warn); }
.march-row.done .letter { color: var(--c-fg1); }
.march-row.open .letter { color: var(--c-accent); }
.march-row .info {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.march-row .info .label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  color: var(--c-fg2);
  text-transform: uppercase;
}
.march-row .info .detail {
  font-size: 13px;
  font-weight: 500;
  color: var(--c-fg);
}
.march-row .status {
  text-align: center;
  font-size: 14px;
}
.march-row.crit .status { color: var(--c-crit); }
.march-row.warn .status { color: var(--c-warn); }
.march-row.done .status { color: var(--c-fg1); }

.med-row {
  display: grid;
  grid-template-columns: 52px auto 1fr;
  gap: 8px;
  align-items: center;
  padding: 7px 12px;
  border-bottom: var(--hairline,1px) solid var(--c-line);
  font-size: 11px;
}
.med-row .ts { font-family: ui-monospace, monospace; color: var(--c-fg2); }
.med-row .icon { color: var(--c-accent); }
.med-row .meta { display: flex; flex-direction: column; gap: 1px; }
.med-row .meta .name {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--c-fg2);
  text-transform: uppercase;
}
.med-row .meta .desc {
  font-family: ui-monospace, monospace;
  font-size: 12px;
  color: var(--c-fg);
}

/* ====================== MEDEVAC ====================== */

.nine-line-row {
  display: grid;
  grid-template-columns: 28px 18px 1fr 70px;
  gap: 0;
  align-items: flex-start;
  padding: var(--nineLinePadding, 8px) 12px;
  border-bottom: var(--hairline,1px) solid var(--c-line);
}
.nine-line-row .number {
  font-family: ui-monospace, monospace;
  font-size: 18px;
  font-weight: 700;
  color: var(--c-accent);
  text-align: center;
}
.nine-line-row .icon { font-size: 12px; padding-top: 2px; color: var(--c-fg); }
.nine-line-row.crit .icon { color: var(--c-crit); }
.nine-line-row.warn .icon { color: var(--c-warn); }
.nine-line-row .meta { padding-left: 4px; }
.nine-line-row .meta .label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
  color: var(--c-fg2);
  text-transform: uppercase;
}
.nine-line-row .meta .value {
  font-family: ui-monospace, monospace;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--c-fg);
}
.nine-line-row.crit .meta .value { color: var(--c-crit); }
.nine-line-row.warn .meta .value { color: var(--c-warn); }
.nine-line-row .badge {
  text-align: right;
  font-family: ui-monospace, monospace;
  font-size: 10px;
  letter-spacing: 0.05em;
  color: var(--c-fg3);
}
.nine-line-row .badge.auto { color: var(--c-accent); }

.map-svg {
  width: 100%;
  height: 100%;
}

.transmit-script {
  background: var(--c-bg);
  border: var(--hairline,1px) solid var(--c-line);
  padding: 8px 10px;
  font-family: ui-monospace, monospace;
  font-size: 11px;
  line-height: 1.55;
}
.transmit-script .accent { color: var(--c-accent); font-weight: 700; }

/* ====================== HANDOFF ====================== */

.sum-line {
  display: grid;
  grid-template-columns: 14px 90px 1fr;
  gap: 8px;
  align-items: baseline;
  padding: 8px 12px;
  border-bottom: var(--hairline,1px) solid var(--c-line);
  font-size: 13px;
}
.sum-line.hot { background: var(--c-bg2); color: var(--c-accent); font-weight: 600; }
.sum-line .icon { color: var(--c-fg2); font-size: 12px; }
.sum-line.hot .icon { color: var(--c-accent); }
.sum-line .label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
  color: var(--c-fg2);
  text-transform: uppercase;
}
.sum-line .value {
  font-size: 13px;
  font-weight: 500;
  color: var(--c-fg);
}
.sum-line.hot .value { color: var(--c-accent); font-weight: 600; }

.timeline-row {
  display: grid;
  grid-template-columns: 54px 16px 1fr;
  gap: 8px;
  padding: 6px 12px;
  position: relative;
}
.timeline-row .ts {
  font-family: ui-monospace, monospace;
  font-size: 11px;
  color: var(--c-fg2);
}
.timeline-row .rail {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.timeline-row .rail::before {
  content: '';
  position: absolute;
  left: 50%;
  top: 0;
  bottom: 0;
  width: 1px;
  background: var(--c-line);
  transform: translateX(-0.5px);
}
.timeline-row .rail .node {
  position: relative;
  width: 9px;
  height: 9px;
  border: 1.5px solid var(--c-fg2);
  background: var(--c-bg);
  z-index: 1;
}
.timeline-row.hot .rail .node {
  background: var(--c-accent);
  border-color: var(--c-accent);
}
.timeline-row .body {
  display: flex;
  flex-direction: column;
  gap: 1px;
  padding-top: 1px;
}
.timeline-row .body .kind {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--c-fg2);
  text-transform: uppercase;
}
.timeline-row.hot .body .kind { color: var(--c-accent); }
.timeline-row .body .desc {
  font-size: 12px;
  color: var(--c-fg);
}

.export-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  background: var(--c-bg);
  border: var(--hairline,1px) solid var(--c-line);
  margin-bottom: 6px;
}
.export-card .icon { width: 18px; text-align: center; font-size: 14px; }
.export-card.ready .icon { color: var(--c-fg); }
.export-card:not(.ready) .icon { color: var(--c-fg2); }
.export-card .meta { flex: 1; min-width: 0; }
.export-card .meta .name {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--c-fg);
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.export-card .meta .detail {
  font-family: ui-monospace, monospace;
  font-size: 10px;
  color: var(--c-fg2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.export-card .pill {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 6px;
  border: var(--hairline,1px) solid currentColor;
  white-space: nowrap;
}
.export-card.ready .pill { color: var(--c-ok); }
.export-card:not(.ready) .pill { color: var(--c-fg2); border-color: var(--c-fg3); }

.dest-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.dest-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px;
  background: var(--c-bg);
  border: var(--hairline,1px) solid var(--c-line);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--c-fg);
  text-transform: uppercase;
}
.dest-card.active {
  background: var(--c-bg2);
  border-color: var(--c-accent);
  color: var(--c-accent);
}
.dest-card .icon { font-size: 16px; }

/* ====================== FOOTER ====================== */

.footer-hints {
  display: flex;
  align-items: center;
  background: var(--c-bg);
  border-top: var(--hairline,1px) solid var(--c-line);
  padding: 0 24px 0 24px;
  flex-shrink: 0;
  font-size: 11px;
  color: var(--c-fg2);
}
.footer-hints .leading,
.footer-hints .trailing {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.footer-hints .trailing { color: var(--c-accent); margin-left: auto; }
.footer-hints .center {
  flex: 1;
  display: flex;
  justify-content: center;
  gap: 14px;
  font-size: 11px;
  color: var(--c-fg2);
}

/* ====================== OUTPUT ====================== */

.output {
  background: var(--ui-bg1);
  border-top: 1px solid var(--ui-line);
  padding: 12px 16px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: end;
  max-height: 240px;
  overflow: hidden;
}

.output pre {
  margin: 0;
  padding: 10px 12px;
  background: var(--ui-bg);
  border: 1px solid var(--ui-line);
  border-radius: 2px;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 11px;
  line-height: 1.5;
  color: var(--ui-fg);
  overflow: auto;
  max-height: 200px;
}

.output .actions {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.output .actions button {
  padding: 8px 14px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  border: 1px solid var(--ui-line);
  background: var(--ui-bg);
  color: var(--ui-fg);
}
</style>
</head>

// ============================================================
// Control wiring
// ============================================================

function wireControls() {
  document.querySelectorAll('.row[data-key]').forEach(row => {
    const key = row.dataset.key;
    const min = parseFloat(row.dataset.min);
    const max = parseFloat(row.dataset.max);
    const step = parseFloat(row.dataset.step);
    const label = row.querySelector('label');

    const slider = document.createElement('input');
    slider.type = 'range';
    slider.min = min;
    slider.max = max;
    slider.step = step;
    slider.value = state[key];
    slider.style.gridColumn = '1';

    const num = document.createElement('input');
    num.type = 'number';
    num.min = min;
    num.max = max;
    num.step = step;
    num.value = state[key];

    row.appendChild(slider);
    row.appendChild(num);

    slider.addEventListener('input', () => {
      state[key] = parseFloat(slider.value);
      num.value = slider.value;
      updateAll();
    });
    num.addEventListener('input', () => {
      const v = parseFloat(num.value);
      if (!isNaN(v)) {
        state[key] = v;
        slider.value = v;
        updateAll();
      }
    });

    row._slider = slider;
    row._num = num;
  });

  document.querySelectorAll('#themeRadio button').forEach(btn => {
    btn.addEventListener('click', () => {
      state.theme = btn.dataset.theme;
      document.querySelectorAll('#themeRadio button').forEach(b => b.classList.toggle('active', b === btn));
      updateAll();
    });
  });

  document.querySelectorAll('.screen-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.screen = btn.dataset.screen;
      document.querySelectorAll('.screen-btn').forEach(b => b.classList.toggle('active', b === btn));
      updateAll();
    });
  });

  document.getElementById('zoom').addEventListener('change', e => {
    state.zoom = parseFloat(e.target.value);
    updateAll();
  });

  document.querySelectorAll('.preset-row button').forEach(btn => {
    btn.addEventListener('click', () => {
      applyPreset(btn.dataset.preset);
    });
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    Object.assign(state, DEFAULTS);
    syncControlsFromState();
    updateAll();
  });

  function copyOut(targetBtn) {
    navigator.clipboard.writeText(buildSnippet()).then(() => {
      const orig = targetBtn.textContent;
      targetBtn.textContent = 'Copied!';
      targetBtn.classList.add('copied');
      setTimeout(() => {
        targetBtn.textContent = orig;
        targetBtn.classList.remove('copied');
      }, 1100);
    });
  }
  document.getElementById('copyBtn').addEventListener('click', e => copyOut(e.currentTarget));
  document.getElementById('copyBtn2').addEventListener('click', e => copyOut(e.currentTarget));
}

function applyPreset(name) {
  const preset = PRESETS[name];
  if (!preset) return;
  Object.assign(state, preset);
  syncControlsFromState();
  updateAll();
}

function syncControlsFromState() {
  document.querySelectorAll('.row[data-key]').forEach(row => {
    const k = row.dataset.key;
    if (row._slider) row._slider.value = state[k];
    if (row._num) row._num.value = state[k];
  });
}

function gridLines(w, h, step) {
  const out = [];
  for (let x = 0; x <= w; x += step) out.push(`<line x1="${x}" y1="0" x2="${x}" y2="${h}"/>`);
  for (let y = 0; y <= h; y += step) out.push(`<line x1="0" y1="${y}" x2="${w}" y2="${y}"/>`);
  return out.join('');
}

function makeECGPath(w, h) {
  // Stylized PQRST repeated across width
  const cycle = 80;
  const cycles = Math.ceil(w / cycle);
  const baseline = h * 0.55;
  let d = `M 0 ${baseline}`;
  for (let i = 0; i < cycles; i++) {
    const x0 = i * cycle;
    // P wave (small bump up)
    d += ` L ${x0 + 12} ${baseline}`;
    d += ` Q ${x0 + 16} ${baseline - 8} ${x0 + 20} ${baseline}`;
    // PR flat
    d += ` L ${x0 + 28} ${baseline}`;
    // QRS
    d += ` L ${x0 + 32} ${baseline + 6}`;
    d += ` L ${x0 + 36} ${baseline - h * 0.45}`;
    d += ` L ${x0 + 40} ${baseline + 10}`;
    d += ` L ${x0 + 44} ${baseline}`;
    // ST
    d += ` L ${x0 + 56} ${baseline}`;
    // T wave
    d += ` Q ${x0 + 64} ${baseline - 14} ${x0 + 72} ${baseline}`;
    d += ` L ${x0 + cycle} ${baseline}`;
  }
  return d;
}

function trendLine(values, colorVar) {
  const w = 360, h = 140;
  const max = Math.max(...values), min = Math.min(...values);
  const range = max - min;
  const xstep = w / (values.length - 1);
  const points = values.map((v, i) => {
    const x = i * xstep;
    const y = h - ((v - min) / range) * (h - 20) - 10;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<polyline points="${points}" fill="none" stroke="var(--c-${colorVar})" stroke-width="1.4"/>`;
}
